<body>

<!-- LOADER -->
<div class="loader-screen" id="loader">
    <div class="loader-card">
        <div class="loader-label">loading...</div>

        <div class="progress-box">
            <div class="progress-fill" id="progress"></div>
        </div>

        <img src="photo/L_trot2.gif" id="loaderGif" class="loader-gif">
    </div>
</div>

<!-- MAIN -->
<div class="main-content" id="mainContent">

    <div class="container">

        <!-- 1 -->
        <div class="card" onclick="openCard(this)">
            <div class="card-front">
                <img src="photo/pony.png">
                <div class="title">Candy Fag 
                    Social Page's</div>
            </div>
            <div class="card-back">
                <button class="back-btn">Back</button>
                <ul>
                    <li>
                        <a href="https://www.instagram.com/linduci2004/" target="_blank" class="icon-link">
                            <img src="photo/ig_icon.png" class="icon">
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 2 -->
        <div class="card" onclick="openCard(this)">
            <div class="card-front">
                <div class="title">Soon</div>
                <img src="photo/Furry.png">
            </div>
            <div class="card-back">
                <button class="back-btn">Back</button>
                <ul>
                    <li>Soon</li>
                </ul>
            </div>
        </div>

        <!-- 3 -->
        <div class="card" onclick="openCard(this)">
            <div class="card-front">
                <div class="title">My social DM</div>
            </div>
            <div class="card-back">
                <button class="back-btn">Back</button>
                <ul>
                    <li>
                        <a href="t.me/Mochi_SK" target="_blank" class="icon-link">
                            <img src="photo/telegram.png" class="icon">
                        </a>
                        <a href="https://discord.gg/dhG5yZJ6" target="_blank" class="icon-link">
                            <img src="photo/dc.webp" class="icon">
                        </a>
                        <a href="https://www.twitch.tv/linduci" target="_blank" class="icon-link">
                            <img src="photo/twitch.webp" class="icon">
                        </a>
                        <a href="https://kick.com/linduci" target="_blank" class="icon-link">
                            <img src="photo/kick.png" class="icon">
                        </a>
                        <a href="https://vrchat.com/home/user/usr_d1d2cb21-4855-4141-9840-9a5c05ae0c88" target="_blank" class="icon-link">
                            <img src="photo/VR.png" class="icon">
                        </a>
                        <a href="https://steamcommunity.com/profiles/76561198821035586/" target="_blank" class="icon-link">
                            <img src="photo/steam.png" class="icon">
                        </a>
                    </li>
                </ul>
            </div>
        </div>

    </div>

</div>

<script>

const loader = document.getElementById('loader');
const progressBar = document.getElementById('progress');
const loaderGif = document.getElementById('loaderGif');
const main = document.getElementById('mainContent');

let progress = 0;

const interval = setInterval(() => {
    progress++;
    progressBar.style.width = progress + '%';
    loaderGif.style.left = `calc(${progress}% - 108px)`;
}, 20);

setTimeout(() => {
    clearInterval(interval);
    loader.classList.add('fade-out');

    setTimeout(() => {
        loader.style.display = 'none';
        main.classList.add('show');
        document.body.style.overflow = 'auto';
    }, 600);
}, 2000);

function openCard(selectedCard) {

    const allCards = document.querySelectorAll('.card');

    if (selectedCard.classList.contains("open")) {
        selectedCard.classList.remove("open");
        allCards.forEach(card => card.classList.remove("hide"));
        return;
    }

    allCards.forEach(card => {
        if (card !== selectedCard) {
            card.classList.add("hide");
        }
    });

    selectedCard.classList.add("open");
}

</script>

</body>
